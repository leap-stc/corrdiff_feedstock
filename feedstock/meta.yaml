title: CorrDiff NYC Downscaling Datasets
description: 'A collection of atmospheric datasets and model outputs prepared for CorrDiff-based
  climate downscaling experiments over the New York City region. The collection includes ERA5
  inputs interpolated to the HRRR grid, HRRR reference datasets, CorrDiff model inputs, generated
  outputs, and target datasets. Data are stored as NetCDF files on the Open Storage Network.

  '
